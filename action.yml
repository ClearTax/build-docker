name: Build DockerImage
description: Build the Docker image and Push to ECR

inputs:
  aws_access_key_id:
    description: 'AWS Access Key ID'
    required: true
  aws_secret_access_key:
    description: 'AWS Secret Access Key'
    required: true
  aws_region:
    description: 'AWS Region'
    default: 'ap-south-1'
  service:
    description: 'Array of services'
    required: true
  dockerfile:
    description: 'Dockerfile path'
    required: true
    default: 'Dockerfile'
  version:
    description: 'The version of the artifact'
    required: true
  build_args:
    description: 'Build arguments'
    required: false
    default: ''
  download_artifact:
    description: 'Download artifact'
    required: false
    default: 'true'
  multi_arch:
    description: 'Build multi arch image: linux/amd64,linux/arm64'
    required: false
    default: 'false'
  target_arch:
    description: 'Desired architechture for your docker image'
    default: 'linux/amd64'
    required: false
  context:
    description: 'Docker build context path'
    required: false
    default: '.'
  target:
    description: 'Docker build target stage (for multi-stage builds)'
    required: false
    default: ''
  additional_tags:
    description: 'Additional tags to push (newline-separated)'
    required: false
    default: ''
  secrets:
    description: "List of secrets to expose to the build (e.g., key=string, GIT_AUTH_TOKEN=mytoken)"
    required: false
  secret-envs:
    description: "List of secret env vars to expose to the build (e.g., key=envname, MY_SECRET=MY_ENV_VAR)"
    required: false
  secret-files:
    description: "List of secret files to expose to the build (e.g., key=filename, MY_SECRET=./secret.txt)"
    required: false

runs:
  using: composite
  steps:
    - name: Fetch Artifacts
      if : ${{ inputs.download_artifact == 'true' }}
      uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4.3.0
      with:
        name: artifacts-${{github.run_id}}
    
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@7474bc4690e29a8392af63c5b98e7449536d5c3a # v4.3.1
      with:
        aws-access-key-id: ${{ inputs.aws_access_key_id }}
        aws-secret-access-key: ${{ inputs.aws_secret_access_key }}
        aws-region: ${{ inputs.aws_region }}
    
    - name: Login to Amazon ECR
      id: login-ecr
      uses: aws-actions/amazon-ecr-login@f2e9fc6c2b355c1890b65e6f6f0e2ac3e6e22f78 # v2
    
    - name: Set up QEMU
      if: ${{ inputs.multi_arch == 'true' }}
      uses: docker/setup-qemu-action@c7c53464625b32c7a7e944ae62b3e17d2b600130 # v3.7.0
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3.12.0
    
    - name: Build Docker - ${{ inputs.service }}
      uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
      env:
        DOCKER_BUILD_SUMMARY: "false"
      with:
        context: ${{ inputs.context }}
        file: ${{ inputs.dockerfile }}
        tags: |
          ${{ steps.login-ecr.outputs.registry }}/${{ inputs.service }}:${{ inputs.version }}
          ${{ inputs.additional_tags != '' && format('{0}/{1}:{2}', steps.login-ecr.outputs.registry, inputs.service, inputs.additional_tags) || '' }}
        build-args: ${{ inputs.build_args }}
        target: ${{ inputs.target }}
        push: true
        cache-from: type=gha,scope=${{ github.workflow }}-${{ github.job }}
        cache-to:   type=gha,scope=${{ github.workflow }}-${{ github.job }},mode=max
        platforms: ${{ inputs.multi_arch == 'true' && 'linux/amd64,linux/arm64' || inputs.target_arch }}
        secrets: ${{ inputs.secrets }}
        secret-envs: ${{ inputs.secret-envs }}
        secret-files: ${{ inputs.secret-files }}
